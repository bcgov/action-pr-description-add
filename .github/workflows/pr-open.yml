name: PR
on:
  pull_request:

jobs:
  test:
    name: Test Action
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      # Rebuild ./dist
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
      - name: Rebuild the dist/ directory
        run: npm run dist 
     
     # Test action
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_markdown: |
            ---

            # Things!
            ## Excitement!
            [Links!](https://google.ca)
            `Code!`

      # Test with different inputs
      - uses: ./
        with:
          add_markdown: |
            ---

            # Things!
            ## Excitement!
            [Links!](https://google.ca)
            `Code!`

      # Test checkbox handling - should not duplicate when checkbox state changes
      # This tests that checkboxes with same content don't cause false positive duplicates
      - uses: ./
        with:
          add_markdown: |
            ## Checkbox Test
            - [ ] Unchecked item
            - [x] Checked item

      # Verify checkbox content is not duplicated when run again
      - uses: ./
        with:
          add_markdown: |
            ## Checkbox Test
            - [ ] Unchecked item
            - [x] Checked item
