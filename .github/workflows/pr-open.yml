name: PR
on:
  pull_request:

jobs:
  test:
    name: Test Action
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
     # Test action
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_markdown: |
            ---

            # Things!
            ## Excitement!
            [Links!](https://google.ca)
            `Code!`

      # Test with different inputs
      - uses: ./
        with:
          add_markdown: |
            ---

            # Things!
            ## Excitement!
            [Links!](https://google.ca)
            `Code!`

      # Test checkbox handling - should not duplicate when checkbox state changes
      # This tests that checkboxes with same content don't cause false positive duplicates
      - uses: ./
        with:
          add_markdown: |
            ## Checkbox Test
            - [ ] Unchecked item
            - [x] Checked item

      # Verify checkbox content is not duplicated when run again
      - uses: ./
        with:
          add_markdown: |
            ## Checkbox Test
            - [ ] Unchecked item
            - [x] Checked item
