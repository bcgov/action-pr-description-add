name: "Add to PR Descriptions"
description: "This Action has moved to bcgov/actions/pr-description-add"
author: "Derek Roberts"
branding:
  icon: "plus"
  color: "blue"

inputs:
  add_markdown:
    description: "Markdown message to use in PR description"
    required: true
  github_token:
    description: "GitHub token or a Personal Access Token (PAT)"
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Migration Warning
      shell: bash
      run: |
        echo "::warning::This Action has moved to bcgov/actions/pr-description-add. Please update your workflow to use bcgov/actions/pr-description-add instead."

    - name: Delegate to consolidated action
      uses: bcgov/actions/pr-description-add@v0.3.0
      with:
        add_markdown: ${{ inputs.add_markdown }}
        github_token: ${{ inputs.github_token }}
